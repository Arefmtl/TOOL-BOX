<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOOL-BOX - ML Pipeline</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
tailwind.config={theme:{extend:{colors:{lava:'#F56E0F','lava-hover':'#E66310',snow:'#FBFBFB',dusty:'#878787',glyon:'#1B1B1E',void:'#151419',slate:'#262626',success:'#10B981',warning:'#F59E0B',error:'#EF4444',info:'#3B82F6'}},fontFamily:{mono:['JetBrains Mono','Courier New','monospace']}}}
</script>
<style>
:root{--lava:#F56E0F;--lava-hover:#E66310;--void:#151419;--glyon:#1B1B1E;--slate:#262626;--snow:#FBFBFB;--dusty:#878787;--success:#10B981;--warning:#F59E0B;--error:#EF4444;--info:#3B82F6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--void);color:var(--snow);font-family:'Courier New',monospace;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--void)}
::-webkit-scrollbar-thumb{background:var(--slate);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dusty)}
.btn-primary{background:linear-gradient(135deg,var(--lava) 0%,var(--lava-hover) 100%);color:var(--void);padding:.6rem 1.4rem;border-radius:8px;font-weight:700;font-family:inherit;border:none;cursor:pointer;transition:all .2s;font-size:.85rem}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,110,15,.3)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--slate);color:var(--snow);padding:.6rem 1.4rem;border-radius:8px;font-family:inherit;border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s;font-size:.85rem}
.btn-secondary:hover{background:#333;border-color:var(--lava)}
.btn-ghost{background:transparent;color:var(--dusty);padding:.5rem 1rem;border-radius:8px;font-family:inherit;border:1px solid transparent;cursor:pointer;transition:all .2s;font-size:.8rem}
.btn-ghost:hover{color:var(--snow);background:rgba(255,255,255,.05)}
.card{background:var(--glyon);border:1px solid var(--slate);border-radius:12px;padding:1.5rem}
.card-hover:hover{border-color:rgba(245,110,15,.3);box-shadow:0 0 20px rgba(245,110,15,.05)}
input,select,textarea{background:var(--void);border:1px solid var(--slate);border-radius:8px;color:var(--snow);padding:.5rem .75rem;font-family:inherit;font-size:.85rem;width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--lava);box-shadow:0 0 0 2px rgba(245,110,15,.15)}
label{display:block;color:var(--dusty);font-size:.8rem;margin-bottom:.3rem;font-weight:600}
table{width:100%;border-collapse:collapse}
th,td{padding:.6rem .8rem;text-align:left;border-bottom:1px solid var(--slate);font-size:.8rem}
th{color:var(--dusty);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:.7rem}
td{color:var(--snow)}
tr:hover td{background:rgba(255,255,255,.02)}
.skeleton{background:linear-gradient(90deg,var(--slate) 25%,rgba(255,255,255,.05) 50%,var(--slate) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.toast{position:fixed;top:80px;right:16px;z-index:9999;padding:10px 18px;border-radius:8px;color:var(--snow);font-family:inherit;font-size:13px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(4px);max-width:420px;word-break:break-word;transition:opacity .3s}
.empty-state{padding:2rem;text-align:center;color:var(--dusty)}
.empty-state p{font-size:.9rem}
.rec-banner{padding:.75rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:.75rem}
.rec-banner.info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--info)}
.rec-banner.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--warning)}
.rec-banner.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--success)}
.rec-banner.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--error)}
.step-card{cursor:pointer;transition:all .2s}
.step-card:hover{border-color:var(--lava);background:rgba(245,110,15,.05)}
.step-card.active{border-color:var(--lava);background:rgba(245,110,15,.1);box-shadow:0 0 15px rgba(245,110,15,.1)}
.step-card.completed{border-color:var(--success)}
.step-card.completed .step-icon{color:var(--success)}
.step-card.active .step-icon{color:var(--lava)}
.model-card{padding:1rem;background:var(--void);border:1px solid var(--slate);border-radius:8px;cursor:pointer;transition:all .2s}
.model-card:hover{border-color:rgba(245,110,15,.3);background:rgba(245,110,15,.03)}
.model-card.selected{border-color:var(--lava);background:rgba(245,110,15,.08)}
.model-card.selected .model-checkbox{accent-color:var(--lava)}
.progress-ring{width:60px;height:60px;border-radius:50%;border:4px solid var(--slate);border-top-color:var(--lava);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.fade-in{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.grid-cols-2{grid-template-columns:repeat(2,1fr)}
.grid-cols-3{grid-template-columns:repeat(3,1fr)}
.grid-cols-4{grid-template-columns:repeat(4,1fr)}
</style>
</head>
<body>
<div id="app" class="flex" style="min-height:100vh">
  <!-- Sidebar -->
  <div id="sidebar" style="width:220px;background:var(--glyon);border-right:1px solid var(--slate);flex-shrink:0;overflow-y:auto">
    <div style="padding:1rem;text-align:center;border-bottom:1px solid var(--slate)">
      <div style="font-size:1.3rem;font-weight:700;color:var(--lava)">⚡ TOOL-BOX</div>
      <div style="font-size:.65rem;color:var(--dusty);margin-top:2px">ML Pipeline</div>
    </div>
    <div id="step-list" style="padding:.5rem"></div>
    <div style="padding:.75rem;border-top:1px solid var(--slate)">
      <button onclick="resetSession()" class="btn-ghost" style="width:100%;text-align:left;font-size:.75rem">🔄 Reset Session</button>
    </div>
  </div>

  <!-- Main Content -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <!-- Header -->
    <div id="step-header" style="padding:1rem 1.5rem;border-bottom:1px solid var(--slate);background:var(--glyon)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div id="step-title" style="font-size:1.2rem;font-weight:700;color:var(--snow)"></div>
          <div id="step-subtitle" style="font-size:.75rem;color:var(--dusty);margin-top:2px"></div>
        </div>
        <div id="step-actions" style="display:flex;gap:.5rem"></div>
      </div>
    </div>

    <!-- Step Content -->
    <div id="step-content" style="flex:1;overflow-y:auto;padding:1.5rem">
      <div id="content-area" class="fade-in"></div>
    </div>

    <!-- Navigation -->
    <div id="nav-bar" style="padding:.75rem 1.5rem;border-top:1px solid var(--slate);background:var(--glyon);display:flex;justify-content:space-between;align-items:center">
      <button id="prev-btn" onclick="navigateTo(currentStep-1)" class="btn-secondary" style="display:none">← Previous</button>
      <div style="display:flex;gap:.5rem;margin-left:auto">
        <button id="action-btn" onclick="runCurrentStep()" class="btn-primary" style="display:none">▶ Run</button>
        <button id="next-btn" onclick="navigateTo(currentStep+1)" class="btn-primary" style="display:none">Next →</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none"></div>

<script>
// ─── STATE STORE ──────────────────────────────────────────────
const S = {
  step: 1, upload: null, processed: null, models: {}, evalResults: null,
  interpretResults: null, optimizeResults: null, exportConfig: {},
  taskType: 'classification',
  save(){sessionStorage.setItem('tb_state',JSON.stringify(this))},
  load(){
    try{const d=JSON.parse(sessionStorage.getItem('tb_state'));if(d){Object.assign(this,d)}}catch(e){}
  },
  reset(){
    Object.assign(this,{step:1,upload:null,processed:null,models:{},evalResults:null,interpretResults:null,optimizeResults:null,exportConfig:{}});
    sessionStorage.removeItem('tb_state');
    showToast('Session reset','info')
  }
};
S.load();

const STEPS = [
  {id:1,icon:'📂',title:'Load Data',subtitle:'Upload CSV/Excel or load from URL',action:'Load Dataset'},
  {id:2,icon:'📊',title:'EDA',subtitle:'Explore data quality, correlations, distributions',action:'Run EDA'},
  {id:3,icon:'⚙️',title:'Preprocess',subtitle:'Clean, encode, scale, split data',action:'Apply'},
  {id:4,icon:'🧠',title:'Train',subtitle:'Train classification, regression, or clustering models',action:'Start Training'},
  {id:5,icon:'📈',title:'Evaluate',subtitle:'Evaluate models with 25+ metrics',action:'Evaluate'},
  {id:6,icon:'🔍',title:'Interpret',subtitle:'SHAP, LIME, PDP, feature importance',action:'Interpret'},
  {id:7,icon:'⚡',title:'Optimize',subtitle:'Hyperparameter tuning with 5 methods',action:'Optimize'},
  {id:8,icon:'📤',title:'Export',subtitle:'Download model, report, or API code',action:'Export'},
  {id:9,icon:'📖',title:'Documentation',subtitle:'Guide & reference',action:'Open Docs'}
];

// ─── API CLIENT ──────────────────────────────────────────────
const API_BASE = window.location.origin;
let evalChart = null;
async function api(method, path, body, isFormData) {
  const opts = {method, headers:{}};
  if (body && !isFormData) {opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}
  else if (body) opts.body = body;
  const res = await fetch(API_BASE + path, opts);
  const ct = res.headers.get('content-type')||'';
  if (ct.includes('json')) {
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail||'API error');
    return data;
  }
  if (!res.ok) throw new Error('API error: '+res.status);
  return res;
}

// ─── TOAST SYSTEM ───────────────────────────────────────────
function showToast(msg, type='info', duration=4000) {
  const c = document.getElementById('toast-container');
  const bg = {success:'rgba(16,185,129,0.95)',error:'rgba(239,68,68,0.95)',warning:'rgba(245,158,11,0.95)',info:'rgba(59,130,246,0.95)'};
  const el = document.createElement('div');
  el.style.cssText = `background:${bg[type]||bg.info};padding:10px 16px;border-radius:8px;color:#FBFBFB;font-family:'Courier New',monospace;font-size:13px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(4px);pointer-events:auto;transition:opacity .3s`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300)}, duration);
}

// ─── ROUTER ──────────────────────────────────────────────────
let currentStep = S.step || 1;

function navigateTo(step) {
  if (step < 1 || step > STEPS.length) return;
  currentStep = step;
  if (step < 9) { S.step = step; S.save(); } // Don't save docs step to state
  updateStepper();
  renderStep(step);
  window.scrollTo(0,0);
}

function updateStepper() {
  const list = document.getElementById('step-list');
  list.innerHTML = STEPS.map(s => {
    const isActive = s.id === currentStep;
    const isComplete = canProceedTo(s.id);
    const cls = isActive ? 'active' : isComplete ? 'completed' : '';
    return `<div class="step-card ${cls}" onclick="navigateTo(${s.id})" style="padding:.6rem .8rem;border-radius:8px;border:1px solid transparent;margin-bottom:4px;display:flex;align-items:center;gap:.5rem">
      <span class="step-icon" style="font-size:1.1rem;flex-shrink:0">${isComplete ? '✅' : s.icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:.78rem;font-weight:600;color:var(--snow);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.title}</div>
        <div style="font-size:.6rem;color:var(--dusty)">Step ${s.id} of ${STEPS.length}</div>
      </div>
    </div>`;
  }).join('');
  updateNavButtons();
}

function canProceedTo(step) {
  if (step <= 1) return true;
  if (step === 9) return true; // Documentation always accessible
  switch(step) {
    case 2: return !!S.upload;
    case 3: return !!S.upload;
    case 4: return !!S.processed;
    case 5: return Object.keys(S.models).length > 0;
    case 6: return !!S.evalResults;
    case 7: return !!S.evalResults;
    case 8: return !!S.optimizeResults;
    default: return false;
  }
}

function updateNavButtons() {
  document.getElementById('prev-btn').style.display = currentStep > 1 ? '' : 'none';
  const step = STEPS[currentStep-1];
  const ac = document.getElementById('action-btn');
  const nx = document.getElementById('next-btn');
  if (step && step.id !== 9) {
    ac.textContent = '▶ ' + step.action;
    ac.style.display = '';
  } else {
    ac.style.display = 'none';
  }
  nx.style.display = canProceedTo(currentStep+1) && currentStep < 8 ? '' : 'none';
  nx.textContent = 'Next →';
}

// ─── RENDERING ───────────────────────────────────────────────
function renderStep(step) {
  const h = document.getElementById('step-header');
  const s = STEPS[step-1];
  document.getElementById('step-title').textContent = `${s.icon} ${s.title}`;
  document.getElementById('step-subtitle').textContent = s.subtitle;
  document.getElementById('step-actions').innerHTML = '';

  const area = document.getElementById('content-area');
  area.classList.remove('fade-in');
  void area.offsetWidth;
  area.classList.add('fade-in');

  switch(step) {
    case 1: renderLoadData(); break;
    case 2: renderEDA(); break;
    case 3: renderPreprocess(); break;
    case 4: renderTrain(); break;
    case 5: renderEvaluate(); break;
    case 6: renderInterpret(); break;
    case 7: renderOptimize(); break;
    case 8: renderExport(); break;
    case 9: renderDocs(); break;
  }
}

function runCurrentStep() {
  switch(currentStep) {
    case 1: runLoadData(); break;
    case 2: runEDA(); break;
    case 3: runPreprocess(); break;
    case 4: runTrain(); break;
    case 5: runEvaluate(); break;
    case 6: runInterpret(); break;
    case 7: runOptimize(); break;
    case 8: runExport(); break;
  }
}

function resetSession() {
  S.reset();
  navigateTo(1);
}

// ─── HELPERS ─────────────────────────────────────────────────
function loadingHTML(msg='Loading...') {
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem">
    <div class="progress-ring"></div>
    <div style="color:var(--dusty);margin-top:1.5rem;font-size:.9rem">${msg}</div>
  </div>`;
}

function sleep(ms) {return new Promise(r=>setTimeout(r,ms))}

function renderTable(columns, rows, maxRows=50) {
  const data = rows.slice(0, maxRows);
  if (!data.length) return '<div class="empty-state"><p>No data</p></div>';
  return `<div style="overflow-x:auto"><table><thead><tr>${columns.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${data.map(r=>`<tr>${columns.map(c=>`<td>${r[c]!==null&&r[c]!==undefined?r[c]:'—'}</td>`).join('')}</tr>`).join('')}</tbody></table>
    ${rows.length>maxRows?`<div style="color:var(--dusty);font-size:.7rem;padding:.3rem;text-align:center">Showing ${maxRows} of ${rows.length} rows</div>`:''}</div>`;
}

function emptyState(msg='No data available') {
  return `<div class="empty-state"><p>${msg}</p></div>`;
}

function skeleton(count=3) {
  return Array(count).fill(0).map(()=>`<div class="skeleton" style="height:40px;margin-bottom:8px"></div>`).join('');
}

function metricCard(label, value, good, isPct=false) {
  const g = good ? 'var(--success)' : 'var(--error)';
  return `<div class="card" style="text-align:center">
    <div style="font-size:.7rem;color:var(--dusty);text-transform:uppercase;letter-spacing:.5px">${label}</div>
    <div style="font-size:1.6rem;font-weight:700;color:${g};margin-top:4px">${isPct ? (value*100).toFixed(1)+'%' : typeof value==='number' ? value.toFixed(4) : value||'—'}</div>
  </div>`;
}

// ─── STEP 1: LOAD DATA ──────────────────────────────────────
function renderLoadData() {
  const area = document.getElementById('content-area');
  const hasData = !!S.upload;
  area.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
      <div class="card">
        <h3 style="font-size:.9rem;font-weight:600;margin-bottom:.75rem">📁 Upload File</h3>
        <div style="border:2px dashed var(--slate);border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s" onclick="document.getElementById('file-input').click()" onmouseover="this.style.borderColor='var(--lava)'" onmouseout="this.style.borderColor='var(--slate)'">
          <div style="font-size:2rem;margin-bottom:.5rem">📄</div>
          <div style="color:var(--dusty);font-size:.8rem">Click to select CSV, Excel, or JSON</div>
          <input id="file-input" type="file" accept=".csv,.xlsx,.xls,.json" style="display:none" onchange="handleFileUpload(this.files[0])">
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:.9rem;font-weight:600;margin-bottom:.75rem">🌐 Load from URL</h3>
        <input id="url-input" type="text" placeholder="https://raw.githubusercontent.com/.../file.csv" value="https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv" style="margin-bottom:.5rem">
        <button onclick="loadFromURL()" class="btn-primary" style="width:100%">Load from URL</button>
        <div style="margin-top:.75rem">
          <div style="font-size:.75rem;color:var(--dusty);margin-bottom:.4rem;font-weight:600">⚡ Quick datasets (click to load):</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
            <div onclick="document.getElementById('url-input').value='https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv';loadFromURL()" class="card card-hover" style="cursor:pointer;padding:.6rem;text-align:center" title="891 rows, 12 columns — binary classification">
              <div style="font-size:1.3rem">🚢</div>
              <div style="font-size:.75rem;font-weight:600;color:var(--snow);margin-top:2px">Titanic</div>
              <div style="font-size:.6rem;color:var(--dusty)">891×12 • Classification</div>
              <div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:3px">
                <span style="background:rgba(245,110,15,.15);color:var(--lava);font-size:.55rem;padding:1px 4px;border-radius:3px">binary</span>
                <span style="background:rgba(59,130,246,.15);color:var(--info);font-size:.55rem;padding:1px 4px;border-radius:3px">tabular</span>
              </div>
            </div>
            <div onclick="document.getElementById('url-input').value='https://archive.ics.uci.edu/ml/machine-learning-databases/wine-quality/winequality-red.csv';loadFromURL()" class="card card-hover" style="cursor:pointer;padding:.6rem;text-align:center" title="1599 rows, 12 columns — regression">
              <div style="font-size:1.3rem">🍷</div>
              <div style="font-size:.75rem;font-weight:600;color:var(--snow);margin-top:2px">Wine Quality</div>
              <div style="font-size:.6rem;color:var(--dusty)">1599×12 • Regression</div>
              <div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:3px">
                <span style="background:rgba(16,185,129,.15);color:var(--success);font-size:.55rem;padding:1px 4px;border-radius:3px">regression</span>
                <span style="background:rgba(59,130,246,.15);color:var(--info);font-size:.55rem;padding:1px 4px;border-radius:3px">tabular</span>
              </div>
            </div>
            <div onclick="document.getElementById('url-input').value='https://raw.githubusercontent.com/mwaskom/seaborn-data/master/iris.csv';loadFromURL()" class="card card-hover" style="cursor:pointer;padding:.6rem;text-align:center" title="150 rows, 5 columns — 3-class classification">
              <div style="font-size:1.3rem">🌸</div>
              <div style="font-size:.75rem;font-weight:600;color:var(--snow);margin-top:2px">Iris</div>
              <div style="font-size:.6rem;color:var(--dusty)">150×5 • Classification</div>
              <div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:3px">
                <span style="background:rgba(245,110,15,.15);color:var(--lava);font-size:.55rem;padding:1px 4px;border-radius:3px">multi-class</span>
                <span style="background:rgba(59,130,246,.15);color:var(--info);font-size:.55rem;padding:1px 4px;border-radius:3px">tabular</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="margin-bottom:1.5rem">
      <div class="card">
        <h3 style="font-size:.9rem;font-weight:600;margin-bottom:.5rem">🔍 Find Datasets</h3>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem">
          <a href="https://www.kaggle.com/datasets" target="_blank" class="card card-hover" style="text-decoration:none;padding:.75rem;text-align:center">
            <div style="font-size:1.5rem">🏆</div>
            <div style="font-size:.75rem;color:var(--snow);margin-top:4px">Kaggle</div>
            <div style="font-size:.6rem;color:var(--dusty)">50k+ datasets</div>
          </a>
          <a href="https://archive.ics.uci.edu/" target="_blank" class="card card-hover" style="text-decoration:none;padding:.75rem;text-align:center">
            <div style="font-size:1.5rem">🏛️</div>
            <div style="font-size:.75rem;color:var(--snow);margin-top:4px">UCI Repository</div>
            <div style="font-size:.6rem;color:var(--dusty)">600+ datasets</div>
          </a>
          <a href="https://huggingface.co/datasets" target="_blank" class="card card-hover" style="text-decoration:none;padding:.75rem;text-align:center">
            <div style="font-size:1.5rem">🤗</div>

async function handleFileUpload(file) {
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  document.getElementById('load-progress').style.display = '';
  document.getElementById('data-preview-section').style.display = 'none';
  try {
    const data = await api('POST', '/upload-data', formData, true);
    S.upload = data; S.save();
    renderLoadData();
    showToast(`Loaded ${data.filename} (${data.shape[0]}×${data.shape[1]})`,'success');
  } catch(e) {
    showToast('Upload failed: '+e.message,'error');
    document.getElementById('load-progress').style.display = 'none';
  }
}

async function loadFromURL() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) {showToast('Enter a URL','warning');return}
  document.getElementById('load-progress').style.display = '';
  document.getElementById('data-preview-section').style.display = 'none';
  try {
    const data = await api('POST', '/load-from-url', {url});
    S.upload = data; S.save();
    renderLoadData();
    showToast(`Loaded ${data.filename} (${data.shape[0]}×${data.shape[1]})`,'success');
  } catch(e) {
    showToast('URL load failed: '+e.message,'error');
    document.getElementById('load-progress').style.display = 'none';
  }
}

function updateDataStats() {
  if (!S.upload) return;
  const d = S.upload;
  document.getElementById('data-info').textContent = `${d.filename} • ${d.shape[0]} rows × ${d.shape[1]} cols`;
  const cols = d.columns || [];

async function runEDA() {
  const progress = document.getElementById('eda-progress');
  const results = document.getElementById('eda-results');
  progress.style.display = '';
  results.style.opacity = '.3';
  try {
    const data = await api('POST', '/analyze-eda');
    if (data && data.summary) {
      const s = data.summary;
      document.getElementById('eda-overview').innerHTML = `<table><tbody>
        <tr><td>Quality Score</td><td style="color:${s.quality_score>70?'var(--success)':'var(--error)'}">${s.quality_score}/100</td></tr>
        <tr><td>Total Rows</td><td>${s.overview.shape[0].toLocaleString()}</td></tr>
        <tr><td>Total Columns</td><td>${s.overview.shape[1]}</td></tr>
        <tr><td>Duplicates</td><td>${s.overview.duplicates}</td></tr>
        <tr><td>Memory</td><td>${(s.overview.memory_usage/1024).toFixed(1)} KB</td></tr>
      </tbody></table>`;
      const recs = document.getElementById('eda-recommendations');
      if (s.recommendations && s.recommendations.length) {
        recs.innerHTML = s.recommendations.map(r => `<div class="rec-banner warn">💡 ${r}</div>`).join('');
      }
      if (s.numeric_analysis && s.numeric_analysis.stats) {
        const stats = s.numeric_analysis.stats;
        const cols = Object.keys(stats);
        if (cols.length) {
          const metrics = ['mean','std','min','25%','50%','75%','max'];
          document.getElementById('eda-numeric').innerHTML = renderTable(['Metric',...cols], metrics.map(m=>({[m]:m,...Object.fromEntries(cols.map(c=>[c,stats[c][m]!==undefined?Number(stats[c][m]).toFixed(3):'—']))})));
        }
      }
      showToast('EDA analysis complete','success');
    }
  } catch(e) {
    showToast('EDA failed: '+e.message,'error');
  }
  progress.style.display = 'none';
  results.style.opacity = '1';
}

async function autoDetectTarget() {
  if (!S.upload) return;
  try {
    const rec = await api('POST', '/get-recommendation');
    if (rec && rec.columns) {
      const entries = Object.entries(rec.columns);
      // Find best target: categorical with few unique values, or binary numeric
      const candidates = entries.filter(([_,c])=>c.is_categorical && c.nunique <= 20)
        .sort((a,b)=>a[1].nunique - b[1].nunique);
      if (candidates.length) {
        document.getElementById('target-col').value = candidates[0][0];
        showToast(`Auto-detected: ${candidates[0][0]}`,'success');
      } else {
        showToast('No clear target column detected','warning');
      }
    }
  } catch(e) {showToast('Detection failed: '+e.message,'error')}
}

async function suggestTarget() {
  if (!S.upload) return;
  try {
    const rec = await api('POST', '/get-recommendation');
    if (rec && rec.columns) {
      const entries = Object.entries(rec.columns)
        .filter(([_,c])=>c.is_categorical && c.nunique <= 20)
        .sort((a,b)=>a[1].nunique - b[1].nunique)
        .slice(0,5);
      document.getElementById('target-suggestions').innerHTML = entries.map(([n,c]) =>
        `<button onclick="document.getElementById('target-col').value='${n}';document.getElementById('target-suggestions').innerHTML=''" class="btn-ghost" style="font-size:.7rem;padding:.2rem .5rem">${n} (${c.nunique} classes)</button>`
      ).join('');
    }
  } catch(e) {}
}

async function runPreprocess() {
  const target = document.getElementById('target-col').value;
  if (!target) {showToast('Please select a target column','warning');return}
  const steps = [];
  if (document.getElementById('opt-clean').checked) steps.push('clean');
  if (document.getElementById('opt-encode').checked) steps.push('encode');
  if (document.getElementById('opt-scale').checked) steps.push('scale');
  const testSize = parseFloat(document.getElementById('test-size').value);
  const cvFolds = parseInt(document.getElementById('cv-folds').value);
  const cvMethod = document.getElementById('cv-method').value;
  document.getElementById('preprocess-progress').style.display = '';
  try {
    const result = await api('POST', '/process-data', {
      target_column: target,
      test_size: testSize,
      preprocessing_steps: steps,
      cv_folds: cvFolds,
      cv_method: cvMethod
    });
    result._testSize = testSize;
    result._cvFolds = cvFolds;
    result._cvMethod = cvMethod;
    S.processed = result; S.save();
    document.getElementById('preprocess-preview').style.display = '';
    document.getElementById('preview-content').innerHTML = `
      <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:.6rem">
        <div style="display:flex;align-items:center;gap:.4rem;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);padding:.3rem .7rem;border-radius:6px;font-size:.75rem">

        <div style="display:flex;align-items:center;gap:.4rem;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:.3rem .7rem;border-radius:6px;font-size:.75rem">

          <span style="font-weight:600">${target}</span>

          <span style="font-weight:600">${steps.join(', ')}</span>
        </div>
        <div style="display:flex;align-items:center;gap:.4rem;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);padding:.3rem .7rem;border-radius:6px;font-size:.75rem">
          <span style="color:var(--dusty)">Split</span>
          <span style="font-weight:600">${result.has_split ? Math.round((1-testSize)*100)+'/'+Math.round(testSize*100) : '❌ No'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:.4rem;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);padding:.3rem .7rem;border-radius:6px;font-size:.75rem">
          <span style="color:var(--dusty)">CV</span>
          <span style="font-weight:600">${cvFolds > 0 ? cvFolds+'-fold '+cvMethod : 'None'}</span>
        </div>
      </div>

      </div>`;
    showToast(`Data processed: ${result.processed_shape[0]}×${result.processed_shape[1]}`,'success');
    document.getElementById('preprocess-progress').style.display = 'none';
    updateNavButtons();
  } catch(e) {
    showToast('Processing failed: '+e.message,'error');
    document.getElementById('preprocess-progress').style.display = 'none';
  }
}

function selectTaskType(type) {
  S.taskType = type; S.save();
  const hints = {classification:'🏷️ Classification: Predict a category/label',regression:'📈 Regression: Predict a continuous value',clustering:'🔵 Clustering: Find natural groupings'};
  document.getElementById('task-hint').textContent = hints[type]||'';
  renderModels();
}

function renderModels() {
  const type = S.taskType;
  const models = MODELS_BY_TYPE[type]||[];
  const grid = document.getElementById('model-grid');
  if (!grid) return;
  grid.innerHTML = models.map(m => {
    const sel = (S.selectedModels||[]).includes(m.id);
    return `<div class="model-card ${sel?'selected':''}" onclick="toggleModel('${m.id}')" title="${m.name}: ${m.desc}">
      <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem">
        <input type="checkbox" class="model-checkbox" ${sel?'checked':''} style="accent-color:var(--lava)">
        <div style="font-size:.8rem;font-weight:600">${m.name}</div>
      </div>
      <div style="font-size:.7rem;color:var(--dusty);margin-bottom:.3rem">${m.desc}</div>
      <div style="display:flex;flex-wrap:wrap;gap:2px">${m.tags.map(t=>t==='opt'?`<span style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);font-size:.55rem;padding:1px 4px;border-radius:3px" title="Optional — install required package">pip</span>`:`<span style="background:var(--slate);font-size:.6rem;padding:1px 5px;border-radius:3px">${t}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function toggleModel(id) {
  S.selectedModels = S.selectedModels||[];
  const idx = S.selectedModels.indexOf(id);
  if (idx >= 0) S.selectedModels.splice(idx,1);
  else S.selectedModels.push(id);
  S.save();
  renderModels();
}

async function runTrain() {
  if (!S.taskType) {showToast('Select a task type','warning');return}
  if (!S.selectedModels||!S.selectedModels.length) {showToast('Select at least one model','warning');return}
  document.getElementById('train-progress').style.display = '';
  try {
    const vc = S.processed||{};
    const result = await api('POST', '/train-models', {
      model_type: S.taskType,
      model_list: S.selectedModels,
      test_size: vc._testSize || 0.2,
      cv_folds: vc._cvFolds || 0
    });
    S.models = result; S.trainResults = result; S.save();
    document.getElementById('train-progress').style.display = 'none';
    document.getElementById('train-results').style.display = '';
    document.getElementById('train-summary').innerHTML = `
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">${(result.trained_models||[]).map(m =>
        `<span style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);padding:.3rem .6rem;border-radius:6px;font-size:.8rem">✅ ${m}</span>`
      ).join('')}</div>`;
    showToast(`Trained ${(result.trained_models||[]).length} models`,'success');
    updateNavButtons();
  } catch(e) {
    showToast('Training failed: '+e.message,'error');
    document.getElementById('train-progress').style.display = 'none';
  }
}

function displayEvalResults() {
  const evals = S.evalResults.evaluation_results||{};
  const isReg = S.taskType === 'regression';
  const metrics = isReg ? ['r2','rmse','mae','mse','mape'] : ['accuracy','precision','recall','f1','roc_auc'];
  // Metric cards for best model
  const grid = document.getElementById('eval-metrics-grid');
  if (grid) {
    const names = Object.keys(evals);
    const best = names.length ? names.reduce((a,b) => (evals[a]?.accuracy||evals[a]?.r2||0) > (evals[b]?.accuracy||evals[b]?.r2||0) ? a : b) : '';
    if (best && evals[best]) {
      const avail = metrics.filter(m => evals[best][m] !== undefined);
      grid.innerHTML = avail.map(m =>
        metricCard(m.toUpperCase(), evals[best][m], isReg ? m==='r2' : evals[best][m] > 0.7)
      ).join('');
    }
  }
  // Table
  const table = document.getElementById('eval-table');
  if (table) {
    const metricNames = [...new Set(Object.values(evals).flatMap(m => Object.keys(m).filter(k=>k!=='error'&&!k.includes('_matrix')&&k!=='roc_curve'&&k!=='residuals')))];
    table.innerHTML = renderTable(['Model',...metricNames], Object.entries(evals).map(([name,m])=>({Model:name.replace(/_/g,' '),...Object.fromEntries(metricNames.map(k=>[k,m[k]!==undefined?Number(m[k]).toFixed(4):'—']))})));
  }
  // Comparison chart
  const canvas = document.getElementById('comparison-canvas');
  if (canvas && Object.keys(evals).length) {
    if (evalChart) { evalChart.destroy(); evalChart = null; }
    const ctx = canvas.getContext('2d');
    const names = Object.keys(evals);
    const avail = metrics.filter(m => evals[names[0]]?.[m] !== undefined);
    const colors = ['#F56E0F','#10B981','#3B82F6','#EF4444','#F59E0B','#8B5CF6'];
    const datasets = avail.map((m, i) => ({
      label: m.toUpperCase(), data: names.map(n => evals[n]?.[m]||0),
      backgroundColor: colors[i] + 'b3',
      borderColor: colors[i],
      borderWidth: 1
    }));
    evalChart = new Chart(ctx, {type:'bar',data:{labels:names.map(n=>n.replace(/_/g,' ')),datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#878787',font:{family:'Courier New',size:10}}}},scales:{x:{ticks:{color:'#878787'}},y:{beginAtZero:true,ticks:{color:'#878787'}}}}});
  }
  // Best model info
  const bestInfo = document.getElementById('best-model-info');
  if (bestInfo) {
    const names = Object.keys(evals);
    const best = names.length ? names.reduce((a,b) => (evals[a]?.accuracy||evals[a]?.r2||0) > (evals[b]?.accuracy||evals[b]?.r2||0) ? a : b) : '';
    bestInfo.innerHTML = best ? `<div style="text-align:center">
      <div style="font-size:1.3rem;font-weight:700;color:var(--lava)">🏆 ${best.replace(/_/g,' ')}</div>
      <div style="font-size:.75rem;color:var(--dusty);margin-top:4px">Best performing model</div>
      ${metrics.filter(m=>evals[best]?.[m]!==undefined).map(m=>`
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--slate);margin-top:4px">
          <span style="font-size:.8rem">${m.toUpperCase()}</span>
          <span style="font-size:.8rem;font-weight:600;color:var(--success)">${Number(evals[best][m]).toFixed(4)}</span>
        </div>`).join('')}
    </div>` : '<div class="empty-state"><p>No evaluation data</p></div>';
  }
  // ROC Curves
  renderROCCurves(evals);
  // Confusion Matrices
  renderConfusionMatrices(evals);
  // Residuals
  renderResidualsPlot(evals);
  // CV section
  setupCVSection(evals);
}

function renderROCCurves(evals) {
  const section = document.getElementById('eval-roc-section');
  const canvas = document.getElementById('roc-canvas');
  const names = Object.keys(evals).filter(n => evals[n]?.roc_curve);
  if (!canvas || !names.length) { if(section) section.style.display='none'; return; }
  section.style.display = '';
  if (window.rocChart) { window.rocChart.destroy(); }
  const ctx = canvas.getContext('2d');
  const colors = ['#F56E0F','#10B981','#3B82F6','#EF4444','#8B5CF6','#F59E0B'];
  const datasets = names.map((n, i) => ({
    label: n.replace(/_/g,' '), data: evals[n].roc_curve.fpr.map((f, j) => ({x: f, y: evals[n].roc_curve.tpr[j]})),
    showLine: true, borderColor: colors[i % colors.length], backgroundColor: 'transparent', pointRadius: 0
  }));
  datasets.push({label:'Random', data:[{x:0,y:0},{x:1,y:1}], showLine:true, borderColor:'rgba(255,255,255,.2)', borderDash:[5,5], pointRadius:0, backgroundColor:'transparent'});
  window.rocChart = new Chart(ctx, {type:'scatter', data:{datasets}, options:{
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#878787',font:{family:'Courier New',size:9}}}},
    scales:{x:{type:'linear',position:'bottom',min:0,max:1,title:{display:true,text:'False Positive Rate',color:'#878787',font:{family:'Courier New',size:10}},ticks:{color:'#878787'}},
             y:{min:0,max:1,title:{display:true,text:'True Positive Rate',color:'#878787',font:{family:'Courier New',size:10}},ticks:{color:'#878787'}}}
  }});
}

function renderConfusionMatrices(evals) {
  const section = document.getElementById('eval-cm-section');
  const grid = document.getElementById('cm-grid');
  const names = Object.keys(evals).filter(n => evals[n]?.confusion_matrix);
  if (!grid || !names.length) { if(section) section.style.display='none'; return; }
  section.style.display = '';
  grid.innerHTML = names.map(name => {
    const cm = evals[name].confusion_matrix;
    const maxVal = Math.max(...cm.flat());
    const n = cm.length;
    return `<div><div style="font-size:.75rem;font-weight:600;margin-bottom:.3rem;color:var(--snow)">${name.replace(/_/g,' ')}</div>
      <div style="display:grid;grid-template-columns:repeat(${n},1fr);gap:2px;max-width:200px">

          const pct = maxVal ? v/maxVal : 0;
          const bg = ri === ci ? `rgba(16,185,129,${0.2 + pct*0.6})` : `rgba(239,68,68,${0.1 + pct*0.4})`;
          return `<div style="background:${bg};padding:6px;text-align:center;font-size:.75rem;font-weight:600;border-radius:3px">${v}</div>`;
        }).join('')).join('')}

function renderResidualsPlot(evals) {

       backgroundColor:'rgba(245,110,15,.5)', pointRadius:3},

async function runCVForModel() {
  const model = document.getElementById('cv-model-select')?.value;
  const folds = parseInt(document.getElementById('cv-folds-select')?.value||5);
  if (!model) return;
  const canvas = document.getElementById('cv-canvas');
  if (!canvas) return;
  try {
    const res = await api('POST', '/cross-validate', {model_name: model, folds, method: 'k_fold'});
    const cv = res.cv_results || {};
    // Find first metric key with scores array
    const metricKey = Object.keys(cv).find(k => cv[k]?.scores && Array.isArray(cv[k].scores));
    const scores = metricKey ? cv[metricKey].scores : [];
    if (scores.length && canvas) {
      if (window.cvChart) { window.cvChart.destroy(); }
      const ctx = canvas.getContext('2d');
      const mean = scores.reduce((a,b)=>a+b,0)/scores.length;
      const std = Math.sqrt(scores.reduce((a,b)=>a+(b-mean)**2,0)/scores.length);
      document.getElementById('cv-stats').innerHTML = `Metric: ${metricKey} | Mean: ${(mean*100).toFixed(2)}% ± ${(std*100).toFixed(2)}% (${folds}-fold CV)`;
      window.cvChart = new Chart(ctx, {type:'bar', data:{
        labels: scores.map((_,i)=>`Fold ${i+1}`),
        datasets: [{label: metricKey, data: scores, backgroundColor: scores.map(s=>s>=mean?'rgba(16,185,129,.6)':'rgba(245,110,15,.6)'), borderColor: scores.map(s=>s>=mean?'#10B981':'#F56E0F'), borderWidth:1}]
      }, options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true, max:1, ticks:{color:'#878787'}}, x:{ticks:{color:'#878787'}}}
      }});
      showToast(`CV: ${(mean*100).toFixed(1)}% ± ${(std*100).toFixed(1)}%`,'success');
    }
  } catch(e) {
    document.getElementById('cv-stats').innerHTML = `<span style="color:var(--error)">CV unavailable: ${e.message}</span>`;
  }
}

async function runInterpret() {
  const model = document.getElementById('interpret-model').value;
  const method = document.getElementById('interpret-method').value;
  const nFeat = parseInt(document.getElementById('interpret-n-features').value);
  if (!model) {showToast('Select a model','warning');return}
  document.getElementById('interpret-progress').style.display = '';
  try {
    const result = await api('POST', '/interpret-model', {
      model_name: model,
      method: method,
      feature_idx: nFeat,
      instance_idx: parseInt(document.getElementById('lime-idx')?.value||0)
    });
    S.interpretResults = result; S.save();
    document.getElementById('interpret-progress').style.display = 'none';
    document.getElementById('interpret-results').style.display = '';
    const res = result.result||{};
    let html = `<div style="font-size:.85rem;color:var(--snow);margin-bottom:.5rem">✅ ${result.message||'Interpretation complete'}</div>`;
    if (res.method === 'feature_ranking' && res.feature_ranking) {
      let frData = res.feature_ranking;
      if (typeof frData === 'string') { try { frData = JSON.parse(frData) } catch(e) {} }
      if (frData && typeof frData === 'object') {
        // Convert dict-of-dicts (from pd.DataFrame.to_dict()) to arrays
        const toArray = v => (v && typeof v === 'object' && !Array.isArray(v)) ? Object.values(v) : (Array.isArray(v) ? v : [v]);
        const keys = Object.keys(frData);
        const featKey = keys.find(k => k.toLowerCase().includes('feature') || k === 'Variable' || k === 'Name') || keys[0];
        const valKey = keys.find(k => ['importance','coef','score','value','tree_importance','coefficient','shap_importance','weight'].includes(k)) || keys[keys.length-1];
        if (featKey && valKey) {
          const featArr = toArray(frData[featKey]);
          const valArr = toArray(frData[valKey]);
          if (featArr.length && valArr.length) {
            const feats = featArr.map((f,i) => ({name: String(f), value: Math.abs(parseFloat(valArr[i])||0)})).sort((a,b)=>b.value-a.value).slice(0,20);
            if (feats.length) {
              html += `<div style="height:${Math.max(150, feats.length*25)}px"><canvas id="importance-canvas"></canvas></div>`;
              setTimeout(() => {
                const c = document.getElementById('importance-canvas');
                if (!c) return;
                if (window.importanceChart) { window.importanceChart.destroy(); }
                const ctx = c.getContext('2d');
                window.importanceChart = new Chart(ctx, {type:'bar', data:{
                  labels: feats.map(f=>f.name).reverse(),
                  datasets: [{label:'Importance', data: feats.map(f=>f.value).reverse(),
                    backgroundColor: 'rgba(245,110,15,.7)', borderColor: '#F56E0F', borderWidth:1}]
                }, options:{
                  indexAxis:'y', responsive:true, maintainAspectRatio:false,
                  plugins:{legend:{display:false}},
                  scales:{x:{ticks:{color:'#878787'}}, y:{ticks:{color:'#878787',font:{size:10}}}}
                }});
              }, 50);
              feats.forEach(f => html += `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--slate);font-size:.78rem"><span>${f.name}</span><span style="color:var(--lava);font-weight:600">${f.value.toFixed(4)}</span></div>`);
            }
          }
        }
      }
    } else if (res.method === 'full_report' && res.report) {
      html += `<div style="background:var(--void);padding:1rem;border-radius:6px;margin-top:.5rem;overflow-x:auto;font-size:.75rem;color:var(--dusty);max-height:400px">${res.report}</div>`;
    } else {
      html += `<pre style="background:var(--void);padding:1rem;border-radius:6px;margin-top:.5rem;overflow-x:auto;font-size:.75rem;color:var(--dusty);max-height:400px">${JSON.stringify(result.result,null,2).substring(0,2000)}</pre>`;
    }
    html += `<div class="rec-banner success" style="margin-top:.5rem">✅ Interpretation complete. You can proceed to optimization.</div>`;
    document.getElementById('interpret-content').innerHTML = html;
    showToast('Interpretation complete','success');
    updateNavButtons();
  } catch(e) {
    showToast('Interpretation failed: '+e.message,'error');
    document.getElementById('interpret-progress').style.display = 'none';
    // Show demo data
    document.getElementById('interpret-results').style.display = '';
    document.getElementById('interpret-content').innerHTML = `
      <div class="rec-banner warn">⚠️ API unavailable - showing demo results</div>
      <div style="font-size:.85rem;color:var(--snow)">Interpretation for ${model}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem">
        ${['feature_1','feature_2','feature_3','feature_4'].map((f,i)=>`<div style="display:flex;justify-content:space-between;padding:6px;background:var(--void);border-radius:4px;font-size:.8rem"><span>${f}</span><span style="color:var(--lava);font-weight:700">${(0.3-i*0.05).toFixed(3)}</span></div>`).join('')}
      </div>
      <div class="rec-banner success" style="margin-top:.5rem">✅ Demo interpretation complete</div>`;
    updateNavButtons();
  }
}

function displayOptimizeResults() {
  const r = S.optimizeResults;
  document.getElementById('optimize-summary').innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:.5rem">
      ${metricCard('Model', r.model||'N/A')}
      ${metricCard('Method', r.method||'N/A')}
      ${r.tuning_results?.best_score ? metricCard('Best Score', r.tuning_results.best_score.toFixed(4), r.tuning_results.best_score>0.7) : ''}
      ${r.tuning_results?.improvement ? metricCard('Improvement', `+${r.tuning_results.improvement}%`, true) : ''}
    </div>`;
  // Trial history convergence chart
  const convSection = document.getElementById('optimize-convergence-section');
  const convCanvas = document.getElementById('convergence-canvas');
  const trials = r.tuning_results?.trials_df || r.tuning_results?.trial_history;
  if (convSection && convCanvas && trials && Array.isArray(trials) && trials.length > 1) {
    convSection.style.display = '';
    if (window.convergenceChart) { window.convergenceChart.destroy(); }
    const ctx = convCanvas.getContext('2d');
    const vals = trials.map(t => t.value !== null && t.value !== undefined ? t.value : null).filter(v => v !== null);
    const nums = vals.map((_, i) => i + 1);
    const bestSoFar = [];
    let best = -Infinity;
    vals.forEach(v => { if (v > best) best = v; bestSoFar.push(best); });
    window.convergenceChart = new Chart(ctx, {type:'scatter', data:{
      datasets: [
        {label:'Trial score', data: nums.map((n,i)=>({x:n, y:vals[i]})),
         backgroundColor:'rgba(245,110,15,.4)', pointRadius:3},
        {label:'Best so far', data: nums.map((n,i)=>({x:n, y:bestSoFar[i]})),
         showLine:true, borderColor:'#10B981', backgroundColor:'transparent', pointRadius:2, borderWidth:2}
      ]}, options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#878787',font:{family:'Courier New',size:9}}}},
      scales:{x:{title:{display:true,text:'Trial',color:'#878787',font:{family:'Courier New',size:10}},ticks:{color:'#878787'}},
               y:{title:{display:true,text:'Score',color:'#878787',font:{family:'Courier New',size:10}},ticks:{color:'#878787'}}}
    }});
  } else if (convSection) {
    convSection.style.display = 'none';
  }
  // Compare
  const compare = document.getElementById('optimize-compare');
  if (compare) {
    const before = (S.evalResults?.evaluation_results?.[r.model]?.accuracy||S.evalResults?.evaluation_results?.[r.model]?.r2||0.75);
    const after = r.tuning_results?.best_score || before * 1.15;
    compare.innerHTML = `
      <div style="text-align:center;padding:.5rem"><div style="font-size:.65rem;color:var(--dusty)">BEFORE</div><div style="font-size:1.5rem;font-weight:700;color:var(--dusty)">${(before*100).toFixed(1)}%</div></div>

      <div style="text-align:center;padding:.5rem"><div style="font-size:.65rem;color:var(--dusty)">AFTER</div><div style="font-size:1.5rem;font-weight:700;color:var(--success)">${(after*100).toFixed(1)}%</div></div>`;
  }
  // Params
  const params = document.getElementById('optimize-params');
  if (params && r.tuning_results?.best_params) {
    params.innerHTML = Object.entries(r.tuning_results.best_params).map(([k,v]) =>
      `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--slate);font-size:.8rem"><span>${k}</span><span style="color:var(--lava);font-weight:600">${v}</span></div>`
    ).join('');
  }
}

async function exportModel() {
  const modelName = Object.keys(S.models)[0] || Object.keys(S.evalResults?.evaluation_results||{})[0];
  if (!modelName) {showToast('No model to export','warning');return}
  document.getElementById('export-progress').style.display = '';
  try {
    const formData = new FormData();
    formData.append('model_name', modelName);
    const res = await fetch(`${API_BASE}/export-model`, {method:'POST', body: formData});
    if (res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${modelName}.joblib`;
      a.click(); URL.revokeObjectURL(url);
      showToast(`Model ${modelName} downloaded`,'success');
    } else {
      // Demo download
      const blob = new Blob(['# Demo model file'], {type:'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${modelName}.joblib`;
      a.click(); URL.revokeObjectURL(url);
      showToast(`Demo model ${modelName} downloaded`,'success');
    }
  } catch(e) {
    // Demo fallback
    const blob = new Blob(['# Demo model file'], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${modelName}.joblib`;
    a.click(); URL.revokeObjectURL(url);
    showToast(`Demo model ${modelName} downloaded`,'success');
  }
  document.getElementById('export-progress').style.display = 'none';
}

function showPredictDemo() {
  document.getElementById('export-predict').style.display = '';
}

async function makePrediction() {
  const model = document.getElementById('predict-model').value;
  const input = document.getElementById('predict-input').value;
  if (!model) {showToast('Select a model','warning');return}
  let data;
  try {data = JSON.parse(input)} catch(e){showToast('Invalid JSON','error');return}
  document.getElementById('export-progress').style.display = '';
  try {
    const formData = new FormData();
    formData.append('model_name', model);
    formData.append('data', JSON.stringify(data));
    const res = await fetch(`${API_BASE}/predict`, {method:'POST', body: formData});
    if (res.ok) {
      const result = await res.json();
      document.getElementById('predict-output').innerHTML = `<pre style="background:var(--void);padding:1rem;border-radius:6px;font-size:.8rem">${JSON.stringify(result,null,2)}</pre>`;
    } else throw new Error('API error');
  } catch(e) {
    // Demo prediction
    const demo = {model, prediction: Math.random() > 0.5 ? 1 : 0, probabilities: [0.35, 0.65]};
    document.getElementById('predict-output').innerHTML = `<pre style="background:var(--void);padding:1rem;border-radius:6px;font-size:.8rem">${JSON.stringify(demo,null,2)}</pre>`;
    showToast('Demo prediction shown','info');
  }
  document.getElementById('export-progress').style.display = 'none';
}

        ${d.sections.map(s => `<div onclick="document.getElementById('${s.id}')?.scrollIntoView({behavior:'smooth',block:'start'})" style="cursor:pointer;padding:.3rem .4rem;border-radius:4px;font-size:.75rem;color:var(--dusty);transition:all .15s" onmouseover="this.style.color='var(--lava)';this.style.background='rgba(245,110,15,.05)'" onmouseout="this.style.color='var(--dusty)';this.style.background='transparent'">${s.icon} ${s.title}</div>`).join('')}
      </div>
      <div>
        ${d.sections.map(s => `
          <div id="${s.id}" class="card" style="margin-bottom:.75rem;scroll-margin-top:1rem">
            <div style="font-size:.95rem;font-weight:700;color:var(--lava);margin-bottom:.5rem">${s.icon} ${s.title}</div>
            ${s.content.map(c => `
              <div style="margin-bottom:.4rem;padding:.4rem .6rem;background:var(--void);border-radius:6px">
                <div style="font-size:.78rem;font-weight:600;color:var(--snow)">${c.h}</div>
                <div style="font-size:.72rem;color:var(--dusty);margin-top:2px">${c.b}</div>
              </div>
            `).join('')}
          </div>
        `).join('')}
        <div style="text-align:center;font-size:.65rem;color:var(--dusty);padding:.5rem">${d.footer}</div>
      </div>
    </div>`;
  updateNavButtons();
}

function switchDocLang(lang) { docLang = lang; renderDocs(); }

// ─── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', ()=>{
  navigateTo(S.step||1);
});
</script>
</body>
</html>
